name: Windows

# GTK packages are not supported on Windows runners; this workflow is disabled.

on:
  push:
    branches:
      - disabled
  pull_request:
    branches:
      - disabled

jobs:
  build-windows:
    name: Windows (Swift ${{ matrix.swift }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - swift: "6.1"
    steps:
      - name: Ignore invalid files
        run: git config --global core.protectNTFS false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: SwiftGLib

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift }}

      - name: Swift version
        run: swift --version

      - name: Build
        run: cd SwiftGLib && swift build

      - name: Test
        run: cd SwiftGLib && swift test
